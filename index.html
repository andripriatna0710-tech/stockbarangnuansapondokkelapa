<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistem Manajemen Inventaris EMMS Nuansa Pondok Kelapa.">
    <title>K-STOCK Nuansa Pondok Kelapa</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes blink { 0%, 100% { background-color: #ffffff; } 50% { background-color: #fef9c3; } }
        .blink-alert { animation: blink 1s infinite; border: 2px solid #facc15; }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [inventory, setInventory] = useState([]);
            const [activeBuilding, setActiveBuilding] = useState("Semua");
            const buildings = ["Menara Swasana", "Menara Samawa", "Galery Marketing"];

            // Hitung Kategori untuk Dashboard
            const stats = useMemo(() => {
                const filtered = activeBuilding === "Semua" ? inventory : inventory.filter(i => i.building === activeBuilding);
                return {
                    total: filtered.length,
                    defect: filtered.filter(i => i.category === "Material Defect").length,
                    stp: filtered.filter(i => i.category === "Chemical STP").length,
                    pool: filtered.filter(i => i.category === "Chemical Kolam Renang").length,
                    critical: filtered.filter(i => i.stok <= i.minStok).length
                };
            }, [inventory, activeBuilding]);

            return (
                <div class="flex min-h-screen">
                    {/* Sidebar Kiri */}
                    <aside class="w-64 bg-white border-r p-6 hidden md:block">
                        <div class="mb-8">
                            <h1 class="font-bold text-blue-700 text-lg leading-tight">STOCK BARANG<br/>NUANSA PK</h1>
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Admin Panel</p>
                        </div>
                        <nav class="space-y-2">
                            <button class="w-full flex items-center gap-3 p-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200">
                                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                            </button>
                            <button class="w-full flex items-center gap-3 p-3 text-gray-500 hover:bg-slate-100 rounded-xl font-semibold">
                                <i data-lucide="package" class="w-5 h-5"></i> Inventaris
                            </button>
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main class="flex-1 p-4 md:p-8">
                        <div class="flex justify-between items-center mb-8">
                            <div>
                                <h2 class="text-3xl font-black text-slate-800">Dashboard</h2>
                                <p class="text-slate-400 font-medium italic">Supervisor Teknik</p>
                            </div>
                            <button class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg flex items-center gap-2">
                                <i data-lucide="plus" class="w-5 h-5"></i> TAMBAH BARANG
                            </button>
                        </div>

                        {/* Menu Gedung */}
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            {buildings.map(b => (
                                <button 
                                    onClick={() => setActiveBuilding(b)}
                                    class={`p-6 rounded-3xl border transition-all ${activeBuilding === b ? 'bg-white border-blue-500 shadow-xl' : 'bg-white border-transparent'}`}
                                >
                                    <div class="bg-slate-100 w-12 h-12 rounded-2xl flex items-center justify-center mb-4 mx-auto">
                                        <i data-lucide="building-2" class="text-slate-600"></i>
                                    </div>
                                    <h4 class="font-bold text-center uppercase text-sm tracking-tighter">{b}</h4>
                                </button>
                            ))}
                        </div>

                        {/* Statistik Utama */}
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 relative overflow-hidden">
                                <div class="bg-blue-50 w-10 h-10 rounded-xl flex items-center justify-center mb-6">
                                    <i data-lucide="box" class="text-blue-600 w-5 h-5"></i>
                                </div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Suku Cadang</p>
                                <h3 class="text-5xl font-black text-slate-800">{stats.total}</h3>
                            </div>

                            <div class={`p-8 rounded-[40px] transition-all relative overflow-hidden ${stats.critical > 0 ? 'blink-alert shadow-xl' : 'bg-white border border-slate-100'}`}>
                                <div class="bg-amber-50 w-10 h-10 rounded-xl flex items-center justify-center mb-6">
                                    <i data-lucide="alert-triangle" class="text-amber-600 w-5 h-5"></i>
                                </div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Stok Kritis</p>
                                <h3 class="text-5xl font-black text-amber-600">{stats.critical}</h3>
                                <p class="text-[10px] font-bold text-amber-500 mt-2">BUTUH RESTOCK SEGERA</p>
                            </div>

                            {/* RINGKASAN KATEGORI KHUSUS */}
                            <div class="bg-white p-6 rounded-[40px] border border-slate-100 shadow-sm flex flex-col justify-between">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Ringkasan Kategori</p>
                                <div class="space-y-3">
                                    <div class="flex justify-between items-center bg-red-50 p-3 rounded-2xl">
                                        <span class="text-xs font-bold text-red-700">Material Defect</span>
                                        <span class="font-black text-red-700">{stats.defect}</span>
                                    </div>
                                    <div class="flex justify-between items-center bg-green-50 p-3 rounded-2xl">
                                        <span class="text-xs font-bold text-green-700">Chemical STP</span>
                                        <span class="font-black text-green-700">{stats.stp}</span>
                                    </div>
                                    {activeBuilding !== "Menara Samawa" && (
                                        <div class="flex justify-between items-center bg-sky-50 p-3 rounded-2xl">
                                            <span class="text-xs font-bold text-sky-700">Chemical Pool</span>
                                            <span class="font-black text-sky-700">{stats.pool}</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize Icons
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
