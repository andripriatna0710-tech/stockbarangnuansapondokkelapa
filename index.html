<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-STOCK Nuansa Pondok Kelapa - Professional Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes blink { 0%, 100% { background-color: #ffffff; } 50% { background-color: #fffbeb; border: 2px solid #fbbf24; } }
        .blink-alert { animation: blink 1s infinite; border: 2px solid #fbbf24 !important; }
        .sidebar-item-active { background-color: #2563eb; color: white; shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Firebase Configuration (DO NOT CHANGE)
        const firebaseConfig = {
            apiKey: "AIzaSyAzYbEMh0n3tXduIeWg5qJbL9-bSyvy6Cg",
            authDomain: "kartu-stock-nuansapondokkelapa.firebaseapp.com",
            projectId: "kartu-stock-nuansapondokkelapa",
            storageBucket: "kartu-stock-nuansapondokkelapa.firebasestorage.app",
            messagingSenderId: "97966076438",
            appId: "1:97966076438:web:f98ac6e1d8f101e3037b37"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const APP_ID = "kartu-stock-nuansapondokkelapa";
        const DATA_REF = db.collection("artifacts").doc(APP_ID).collection("public").doc("data");
        const ITEMS_PATH = DATA_REF.collection("items");
        const TRANS_PATH = DATA_REF.collection("transactions");
        const USERS_PATH = DATA_REF.collection("users");

        const BUILDINGS = ["Menara Swasana", "Menara Samawa", "Galery Marketing"];
        const CATEGORIES = ["Umum", "Material Defect", "Chemical Kolam Renang", "Chemical STP"];

        function App() {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [items, setItems] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [allUsers, setAllUsers] = useState([]);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [filterBuilding, setFilterBuilding] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [showModal, setShowModal] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [toast, setToast] = useState(null);

            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        USERS_PATH.doc(u.uid).onSnapshot(doc => setUserData(doc.data()));
                        ITEMS_PATH.onSnapshot(snap => setItems(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                        TRANS_PATH.orderBy("date", "desc").onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                        USERS_PATH.onSnapshot(snap => setAllUsers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
                return unsubAuth;
            }, []);

            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [user, activeTab, items, showModal, userData]);

            const notify = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            // Logika Perhitungan Dashboard
            const stats = useMemo(() => {
                const base = filterBuilding === 'All' ? items : items.filter(i => i.building === filterBuilding);
                return {
                    total: base.length,
                    low: base.filter(i => (i.currentStock || 0) <= (i.minStock || 5)).length,
                    defect: base.filter(i => i.category === "Material Defect").length,
                    stp: base.filter(i => i.category === "Chemical STP").length,
                    pool: base.filter(i => i.category === "Chemical Kolam Renang").length
                };
            }, [items, filterBuilding]);

            // --- FUNGSI EXPORT ---
            const exportExcel = () => {
                const headers = ["No,Nama Barang,Gedung,Kategori,Stok,Satuan,Status"];
                const rows = items.map((it, idx) => `${idx+1},${it.name},${it.building},${it.category},${it.currentStock},${it.unit},${it.currentStock <= it.minStock ? 'RESTOCK' : 'AMAN'}`);
                const csv = "\uFEFF" + headers.concat(rows).join("\n");
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `STOK_NUANSA_PK_${new Date().getTime()}.csv`;
                link.click();
                notify("Excel Berhasil Diunduh");
            };

            const exportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l');
                doc.text("LAPORAN INVENTARIS NUANSA PONDOK KELAPA", 14, 15);
                const tableData = items.map((it, idx) => [idx+1, it.name, it.building, it.category, it.currentStock, it.unit, it.currentStock <= it.minStock ? 'RESTOCK' : 'OK']);
                doc.autoTable({ head: [['No', 'Nama Barang', 'Gedung', 'Kategori', 'Stok', 'Unit', 'Status']], body: tableData, startY: 25 });
                doc.save("LAPORAN_STOK.pdf");
                notify("PDF Berhasil Diunduh");
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-white"><div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) return <AuthScreen notify={notify} />;

            return (
                <div className="flex min-h-screen">
                    {/* SIDEBAR */}
                    <aside className="w-80 bg-white border-r p-8 hidden lg:flex flex-col sticky top-0 h-screen">
                        <div className="mb-12">
                            <h1 className="font-extrabold text-blue-700 text-xl uppercase tracking-tighter leading-tight">Stock Barang<br/>Nuansa PK</h1>
                            <p className="text-[10px] font-black text-slate-400 mt-2 tracking-widest">{userData?.role || 'User'}</p>
                        </div>
                        <nav className="space-y-2 flex-1">
                            <SidebarLink active={activeTab === 'dashboard'} icon="layout-dashboard" label="Dashboard" onClick={() => setActiveTab('dashboard')} />
                            <SidebarLink active={activeTab === 'inventory'} icon="package" label="Stok Barang" onClick={() => setActiveTab('inventory')} />
                            <SidebarLink active={activeTab === 'history'} icon="history" label="Riwayat Audit" onClick={() => setActiveTab('history')} />
                            {userData?.role === 'ADMIN' && <SidebarLink active={activeTab === 'users'} icon="users" label="Kelola User" onClick={() => setActiveTab('users')} />}
                        </nav>
                        <div className="pt-6 border-t space-y-3">
                            <button onClick={exportExcel} className="w-full p-4 bg-slate-900 text-white rounded-2xl text-xs font-bold flex items-center justify-center gap-2 hover:bg-blue-600 transition-all"><i data-lucide="file-spreadsheet" className="w-4 h-4"></i> EXPORT EXCEL</button>
                            <button onClick={exportPDF} className="w-full p-4 bg-rose-600 text-white rounded-2xl text-xs font-bold flex items-center justify-center gap-2 hover:bg-rose-700 transition-all"><i data-lucide="file-text" className="w-4 h-4"></i> EXPORT PDF</button>
                            <button onClick={() => auth.signOut()} className="w-full p-4 text-rose-500 font-bold text-xs flex items-center justify-center gap-2"><i data-lucide="log-out" className="w-4 h-4"></i> Keluar</button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 p-8 lg:p-12 max-w-7xl mx-auto w-full">
                        <header className="flex justify-between items-center mb-12">
                            <div>
                                <h2 className="text-4xl font-black text-slate-900 uppercase tracking-tighter">{activeTab}</h2>
                                <p className="text-slate-400 font-bold mt-1 uppercase text-xs">{userData?.name} • {userData?.jabatan}</p>
                            </div>
                            <button onClick={() => setShowModal('addItem')} className="px-8 py-4 bg-blue-600 text-white rounded-2xl font-black text-xs shadow-lg hover:scale-105 transition-all flex items-center gap-2"><i data-lucide="plus"></i> TAMBAH BARANG</button>
                        </header>

                        {activeTab === 'dashboard' && <DashboardView stats={stats} buildings={BUILDINGS} onBuildingSelect={(b) => { setFilterBuilding(b); setActiveTab('inventory'); }} />}
                        {activeTab === 'inventory' && <InventoryView items={items} searchQuery={searchQuery} setSearchQuery={setSearchQuery} filterBuilding={filterBuilding} setFilterBuilding={setFilterBuilding} onUpdate={(it) => { setSelectedItem(it); setShowModal('updateStock'); }} buildings={BUILDINGS} />}
                        {activeTab === 'history' && <HistoryView transactions={transactions} />}
                        {activeTab === 'users' && <UsersView users={allUsers} notify={notify} />}
                    </main>

                    {/* MODALS */}
                    {showModal === 'addItem' && <AddItemModal onDismiss={() => setShowModal(null)} notify={notify} />}
                    {showModal === 'updateStock' && selectedItem && <UpdateStockModal item={selectedItem} user={userData} onDismiss={() => setShowModal(null)} notify={notify} />}
                    {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-slate-900 text-white px-8 py-4 rounded-full font-bold shadow-2xl animate-bounce">{toast}</div>}
                </div>
            );
        }

        // --- SUB-VIEWS ---

        function DashboardView({ stats, buildings, onBuildingSelect }) {
            return (
                <div className="space-y-12">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {buildings.map(b => (
                            <button key={b} onClick={() => onBuildingSelect(b)} className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all group text-center">
                                <div className="bg-blue-50 p-4 w-fit rounded-2xl mx-auto mb-4 group-hover:bg-blue-600 group-hover:text-white transition-all"><i data-lucide="building-2"></i></div>
                                <h4 className="font-black text-lg uppercase tracking-tight">{b}</h4>
                                <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase">Pilih Area</p>
                            </button>
                        ))}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <LargeStat title="Total Suku Cadang" value={stats.total} icon="package" color="text-blue-600" />
                        <LargeStat title="Peringatan Stok" value={stats.low} icon="alert-octagon" color="text-amber-500" highlight={stats.low > 0} />
                    </div>
                    <div className="space-y-4">
                        <h3 className="font-black text-slate-900 uppercase text-lg">Ringkasan Kategori</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <SmallStat title="Material Defect" value={stats.defect} color="text-red-600" bg="bg-red-50" />
                            <SmallStat title="Chemical STP" value={stats.stp} color="text-emerald-600" bg="bg-emerald-50" />
                            <SmallStat title="Chemical Pool" value={stats.pool} color="text-sky-600" bg="bg-sky-50" />
                        </div>
                    </div>
                </div>
            );
        }

        function InventoryView({ items, searchQuery, setSearchQuery, filterBuilding, setFilterBuilding, onUpdate, buildings }) {
            const filtered = items.filter(i => {
                const matchSearch = i.name.toLowerCase().includes(searchQuery.toLowerCase()) || i.sku.toLowerCase().includes(searchQuery.toLowerCase());
                const matchBld = filterBuilding === 'All' || i.building === filterBuilding;
                return matchSearch && matchBld;
            });

            return (
                <div className="space-y-8">
                    <div className="flex flex-col md:flex-row gap-4">
                        <div className="relative flex-1">
                            <i data-lucide="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
                            <input type="text" placeholder="Cari barang..." className="w-full pl-16 pr-6 py-5 bg-white border border-slate-100 rounded-3xl outline-none font-bold shadow-sm" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                        </div>
                        <select value={filterBuilding} onChange={e => setFilterBuilding(e.target.value)} className="bg-white px-8 py-5 rounded-3xl border border-slate-100 font-bold outline-none shadow-sm cursor-pointer">
                            <option value="All">Semua Gedung</option>
                            {buildings.map(b => <option key={b} value={b}>{b}</option>)}
                        </select>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                        {filtered.map(it => (
                            <div key={it.id} className={`bg-white p-8 rounded-[3rem] border shadow-sm transition-all relative ${it.currentStock <= it.minStok ? 'border-amber-200 bg-amber-50/30' : 'border-slate-100'}`}>
                                <div className="mb-6">
                                    <span className="text-[9px] font-black uppercase text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">{it.building}</span>
                                    <h3 className="text-xl font-black mt-4 uppercase leading-tight">{it.name}</h3>
                                    <div className="flex gap-2 mt-4">
                                        <span className="text-[9px] font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-lg">{it.sku}</span>
                                        <span className="text-[9px] font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg">{it.category}</span>
                                    </div>
                                </div>
                                <div className="flex items-end justify-between pt-6 border-t border-slate-100">
                                    <div>
                                        <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Stok</p>
                                        <span className={`text-4xl font-black ${it.currentStock <= it.minStock ? 'text-red-600' : 'text-slate-900'}`}>{it.currentStock}</span>
                                        <span className="ml-1 text-xs font-bold text-slate-300 uppercase">{it.unit}</span>
                                    </div>
                                    <button onClick={() => onUpdate(it)} className="p-4 bg-slate-900 text-white rounded-2xl hover:bg-blue-600 transition-all"><i data-lucide="arrow-right-left"></i></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function HistoryView({ transactions }) {
            return (
                <div className="bg-white rounded-[3rem] border border-slate-100 shadow-sm overflow-hidden overflow-x-auto">
                    <table className="w-full text-left">
                        <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                            <tr><th className="p-6">Waktu</th><th className="p-6">Barang</th><th className="p-6">Gedung</th><th className="p-6">Tipe</th><th className="p-6">Qty</th><th className="p-6">Teknisi</th></tr>
                        </thead>
                        <tbody className="text-xs font-bold divide-y divide-slate-50">
                            {transactions.map(t => (
                                <tr key={t.id} className="hover:bg-slate-50">
                                    <td className="p-6 text-[10px]">{new Date(t.date).toLocaleString('id-ID')}</td>
                                    <td className="p-6 uppercase font-black">{t.itemName}</td>
                                    <td className="p-6 uppercase">{t.building}</td>
                                    <td className="p-6 uppercase"><span className={t.type === 'in' ? 'text-emerald-600' : 'text-rose-600'}>{t.type === 'in' ? 'Masuk' : 'Keluar'}</span></td>
                                    <td className="p-6 text-lg font-black">{t.amount}</td>
                                    <td className="p-6 uppercase text-[10px]">{t.technician}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        function UsersView({ users, notify }) {
            return (
                <div className="bg-white rounded-[3rem] border border-slate-100 shadow-sm overflow-hidden">
                    <table className="w-full text-left">
                        <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400"><th className="p-6">Nama</th><th className="p-6">Email</th><th className="p-6">Jabatan</th><th className="p-6">Role</th><th className="p-6">Aksi</th></thead>
                        <tbody className="text-xs font-bold">
                            {users.map(u => (
                                <tr key={u.id} className="border-t">
                                    <td className="p-6 uppercase font-black">{u.name}</td>
                                    <td className="p-6 lowercase text-slate-400">{u.email}</td>
                                    <td className="p-6 uppercase">{u.jabatan}</td>
                                    <td className="p-6"><span className={`px-3 py-1 rounded-lg ${u.role === 'ADMIN' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'}`}>{u.role}</span></td>
                                    <td className="p-6"><button onClick={async () => { if(confirm("Hapus User?")) await USERS_PATH.doc(u.id).delete(); notify("User Dihapus"); }} className="text-rose-500"><i data-lucide="user-minus"></i></button></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        // --- ATOMIC COMPONENTS ---
        function SidebarLink({ active, icon, label, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black text-sm transition-all ${active ? 'sidebar-item-active shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}>
                    <i data-lucide={icon} className="w-5 h-5"></i> {label}
                </button>
            );
        }

        function LargeStat({ title, value, icon, color, highlight }) {
            return (
                <div className={`p-10 rounded-[3rem] border transition-all ${highlight ? 'blink-alert shadow-xl' : 'bg-white border-slate-100'}`}>
                    <i data-lucide={icon} className={`${color} mb-6`}></i>
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{title}</p>
                    <h3 className="text-6xl font-black tracking-tighter mt-2">{value}</h3>
                </div>
            );
        }

        function SmallStat({ title, value, color, bg }) {
            return (
                <div className={`${bg} p-6 rounded-3xl border border-white shadow-sm`}>
                    <p className="text-[9px] font-black text-slate-400 uppercase">{title}</p>
                    <p className={`text-3xl font-black ${color} mt-1`}>{value}</p>
                </div>
            );
        }

        // --- AUTH & MODALS ---
        function AuthScreen({ notify }) {
            const [view, setView] = useState('login');
            const [data, setData] = useState({ email: '', pass: '', name: '', jabatan: '' });

            const login = async (e) => {
                e.preventDefault();
                try { await auth.signInWithEmailAndPassword(data.email, data.pass); } catch (err) { alert("Email/Password Salah!"); }
            };

            const register = async (e) => {
                e.preventDefault();
                try {
                    const res = await auth.createUserWithEmailAndPassword(data.email, data.pass);
                    await USERS_PATH.doc(res.user.uid).set({ name: data.name, email: data.email, jabatan: data.jabatan, role: 'TEKNISI', createdAt: new Date().toISOString() });
                    notify("Berhasil Daftar!"); setView('login');
                } catch (err) { alert(err.message); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md border border-slate-200">
                        <div className="text-center mb-10">
                            <h2 className="text-3xl font-black uppercase tracking-tighter">Authorized Access</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Nuansa Pondok Kelapa</p>
                        </div>
                        <form onSubmit={view === 'login' ? login : register} className="space-y-4">
                            {view === 'register' && (
                                <>
                                    <input required type="text" placeholder="Nama Lengkap" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase" value={data.name} onChange={e => setData({...data, name: e.target.value})} />
                                    <input required type="text" placeholder="Jabatan" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase" value={data.jabatan} onChange={e => setData({...data, jabatan: e.target.value})} />
                                </>
                            )}
                            <input required type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" value={data.email} onChange={e => setData({...data, email: e.target.value})} />
                            <input required type="password" placeholder="Password" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" value={data.pass} onChange={e => setData({...data, pass: e.target.value})} />
                            <button type="submit" className="w-full p-5 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-xl">{view === 'login' ? 'Login' : 'Daftar'}</button>
                        </form>
                        <p className="text-center mt-8 text-[10px] font-bold text-slate-400 uppercase tracking-widest cursor-pointer" onClick={() => setView(view === 'login' ? 'register' : 'login')}>
                            {view === 'login' ? 'Butuh Akses Baru? Registrasi' : 'Sudah Punya Akun? Login'}
                        </p>
                    </div>
                </div>
            );
        }

        function AddItemModal({ onDismiss, notify }) {
            const [data, setData] = useState({ name: '', sku: '', category: CATEGORIES[0], building: BUILDINGS[0], initialStock: 0, minStock: 5, unit: 'pcs' });
            const submit = async (e) => {
                e.preventDefault();
                try {
                    const doc = await ITEMS_PATH.add({ ...data, currentStock: Number(data.initialStock), minStock: Number(data.minStock), date: new Date().toISOString() });
                    if(data.initialStock > 0) await TRANS_PATH.add({ itemId: doc.id, itemName: data.name, building: data.building, type: 'in', amount: Number(data.initialStock), date: new Date().toISOString(), technician: 'SYSTEM', notes: 'STOK AWAL' });
                    notify("Berhasil Disimpan!"); onDismiss();
                } catch (e) { alert(e.message); }
            };
            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                    <form onSubmit={submit} className="bg-white rounded-[4rem] w-full max-w-2xl p-12 modal-animate">
                        <div className="flex justify-between items-center mb-10">
                            <h3 className="text-3xl font-black uppercase tracking-tighter">Input Barang Baru</h3>
                            <button type="button" onClick={onDismiss} className="p-3 bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
                        </div>
                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="col-span-2">
                                <label className="text-[10px] font-black uppercase text-slate-400 ml-4">Nama Barang</label>
                                <input required type="text" className="w-full p-5 bg-slate-50 border rounded-3xl font-black uppercase" value={data.name} onChange={e => setData({...data, name: e.target.value})} />
                            </div>
                            <div>
                                <label className="text-[10px] font-black uppercase text-slate-400 ml-4">Gedung</label>
                                <select className="w-full p-5 bg-slate-50 border rounded-3xl font-black uppercase" value={data.building} onChange={e => setData({...data, building: e.target.value})}>{BUILDINGS.map(b => <option key={b} value={b}>{b}</option>)}</select>
                            </div>
                            <div>
                                <label className="text-[10px] font-black uppercase text-slate-400 ml-4">Kategori</label>
                                <select className="w-full p-5 bg-slate-50 border rounded-3xl font-black uppercase" value={data.category} onChange={e => setData({...data, category: e.target.value})}>
                                    {CATEGORIES.filter(c => data.building === 'Menara Samawa' ? c !== 'Chemical Kolam Renang' : true).map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            <div><label className="text-[10px] font-black uppercase text-slate-400 ml-4">Stok Awal</label><input type="number" className="w-full p-5 bg-slate-50 border rounded-3xl font-black text-center" value={data.initialStock} onChange={e => setData({...data, initialStock: e.target.value})} /></div>
                            <div><label className="text-[10px] font-black uppercase text-slate-400 ml-4">Min Stok</label><input type="number" className="w-full p-5 bg-slate-50 border rounded-3xl font-black text-center" value={data.minStock} onChange={e => setData({...data, minStock: e.target.value})} /></div>
                        </div>
                        <button type="submit" className="w-full p-6 bg-blue-600 text-white rounded-3xl font-black uppercase shadow-xl shadow-blue-100">Simpan ke Database</button>
                    </form>
                </div>
            );
        }

        function UpdateStockModal({ item, user, onDismiss, notify }) {
            const [data, setData] = useState({ amount: 1, type: 'out', notes: '' });
            const submit = async (e) => {
                e.preventDefault();
                const amt = Number(data.amount);
                const cur = Number(item.currentStock);
                if(data.type === 'out' && cur < amt) return alert("Stok Tidak Cukup!");
                const final = data.type === 'in' ? cur + amt : cur - amt;
                try {
                    await ITEMS_PATH.doc(item.id).update({ currentStock: final });
                    await TRANS_PATH.add({ itemId: item.id, itemName: item.name, building: item.building, type: data.type, amount: amt, date: new Date().toISOString(), technician: user?.name?.toUpperCase() || "ADMIN", notes: data.notes.toUpperCase() });
                    notify("Berhasil!"); onDismiss();
                } catch (e) { alert(e.message); }
            };
            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
                    <form onSubmit={submit} className="bg-white rounded-[4rem] w-full max-w-md overflow-hidden modal-animate">
                        <div className={`p-10 text-white flex justify-between items-center ${data.type === 'in' ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                            <h3 className="text-2xl font-black uppercase">{data.type === 'in' ? 'Barang Masuk' : 'Barang Keluar'}</h3>
                            <button type="button" onClick={onDismiss}><i data-lucide="x"></i></button>
                        </div>
                        <div className="p-10 space-y-6">
                            <div className="flex gap-2 p-1 bg-slate-100 rounded-2xl">
                                <button type="button" onClick={() => setData({...data, type: 'out'})} className={`flex-1 py-3 rounded-xl font-bold ${data.type === 'out' ? 'bg-white shadow' : ''}`}>KELUAR</button>
                                <button type="button" onClick={() => setData({...data, type: 'in'})} className={`flex-1 py-3 rounded-xl font-bold ${data.type === 'in' ? 'bg-white shadow' : ''}`}>MASUK</button>
                            </div>
                            <input required type="number" min="1" className="w-full text-7xl font-black text-center bg-transparent outline-none" value={data.amount} onChange={e => setData({...data, amount: e.target.value})} />
                            <input required type="text" placeholder="Catatan Pemakaian" className="w-full p-5 bg-slate-50 border rounded-2xl font-bold uppercase text-center" value={data.notes} onChange={e => setData({...data, notes: e.target.value})} />
                            <button type="submit" className={`w-full p-6 text-white rounded-3xl font-black uppercase shadow-xl ${data.type === 'in' ? 'bg-emerald-600' : 'bg-rose-600'}`}>Konfirmasi Transaksi</button>
                        </div>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
