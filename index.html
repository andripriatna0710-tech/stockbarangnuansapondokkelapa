<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-STOCK Nuansa Pondok Kelapa - Enterprise Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes blink { 0%, 100% { background-color: white; } 50% { background-color: #fef9c3; border: 2px solid #facc15; } }
        .blink-critical { animation: blink 1.2s infinite; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            const [activeBuilding, setActiveBuilding] = useState("Semua");
            
            // CONTOH DATA (Pastikan kategori ini ada di inputan Bapak nanti)
            const [inventory] = useState([
                { id: 1, name: "Material Defect Test", building: "Menara Swasana", category: "Material Defect", stok: 2, minStok: 5 },
                { id: 2, name: "Chemical STP Test", building: "Menara Samawa", category: "Chemical STP", stok: 10, minStok: 5 },
                { id: 3, name: "Chemical Pool Test", building: "Menara Swasana", category: "Chemical Kolam Renang", stok: 1, minStok: 5 }
            ]);

            const buildings = ["Menara Swasana", "Menara Samawa", "Galery Marketing"];

            // LOGIKA HITUNG DASHBOARD (Pikir Lebih Dalam)
            const stats = useMemo(() => {
                const filtered = activeBuilding === "Semua" ? inventory : inventory.filter(i => i.building === activeBuilding);
                return {
                    total: filtered.length,
                    defect: filtered.filter(i => i.category === "Material Defect").length,
                    stp: filtered.filter(i => i.category === "Chemical STP").length,
                    pool: filtered.filter(i => i.category === "Chemical Kolam Renang").length,
                    critical: filtered.filter(i => i.stok <= i.minStok).length
                };
            }, [activeBuilding, inventory]);

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar Navigasi */}
                    <div className="w-72 bg-white border-r p-8 hidden lg:block">
                        <h1 className="font-black text-blue-700 text-xl mb-12">K-STOCK NUANSA PK</h1>
                        <nav className="space-y-4">
                            <div className="p-4 bg-blue-600 text-white rounded-2xl font-bold flex items-center gap-3 shadow-lg shadow-blue-200 cursor-pointer">
                                <i data-lucide="layout-dashboard"></i> Dashboard
                            </div>
                            <div className="p-4 text-slate-400 font-bold flex items-center gap-3 hover:bg-slate-50 rounded-2xl cursor-pointer">
                                <i data-lucide="package"></i> Inventaris
                            </div>
                        </nav>
                    </div>

                    {/* Konten Utama */}
                    <main className="flex-1 p-8">
                        <div className="flex justify-between items-center mb-10">
                            <h2 className="text-4xl font-black text-slate-800">Dashboard <span className="text-slate-300 text-lg block font-medium">Supervisor Teknik</span></h2>
                            <button className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl flex items-center gap-2 hover:scale-105 transition-transform">
                                <i data-lucide="plus"></i> TAMBAH BARANG
                            </button>
                        </div>

                        {/* Pilih Gedung */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                            {buildings.map(b => (
                                <button 
                                    key={b}
                                    onClick={() => setActiveBuilding(b)}
                                    className={`p-8 rounded-[32px] border transition-all text-center ${activeBuilding === b ? 'bg-white border-blue-500 shadow-2xl scale-105' : 'bg-white border-transparent shadow-sm'}`}
                                >
                                    <div className="bg-slate-100 w-14 h-14 rounded-2xl flex items-center justify-center mb-4 mx-auto">
                                        <i data-lucide="building-2" className="text-slate-600"></i>
                                    </div>
                                    <h4 className="font-black uppercase text-sm">{b}</h4>
                                    <p className="text-[10px] text-slate-400 mt-1">KLIK UNTUK TRANSAKSI</p>
                                </button>
                            ))}
                        </div>

                        {/* Statistik & Ringkasan */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Kartu Total */}
                            <div className="bg-white p-10 rounded-[48px] shadow-sm border border-slate-50">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Total Suku Cadang</p>
                                <h3 className="text-6xl font-black text-slate-800 mb-2">{stats.total}</h3>
                                <p className="text-xs font-bold text-slate-400 italic">UNIT TERDATA</p>
                            </div>

                            {/* Kartu Stok Kritis (Blinking) */}
                            <div className={`p-10 rounded-[48px] border transition-all ${stats.critical > 0 ? 'blink-critical shadow-amber-100 shadow-2xl' : 'bg-white border-slate-50 shadow-sm'}`}>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Stok Kritis</p>
                                <h3 className={`text-6xl font-black ${stats.critical > 0 ? 'text-amber-500' : 'text-slate-800'}`}>{stats.critical}</h3>
                                <p className="text-xs font-bold text-amber-600 mt-2 tracking-tighter uppercase">Butuh Restock Segera</p>
                            </div>

                            {/* RINGKASAN KATEGORI (TAMBAHAN CUSTOM) */}
                            <div className="bg-white p-8 rounded-[48px] border border-slate-100 shadow-sm">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Ringkasan Khusus</p>
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center bg-red-50 p-4 rounded-3xl">
                                        <span className="text-sm font-bold text-red-700">Material Defect</span>
                                        <span className="text-2xl font-black text-red-700">{stats.defect}</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-emerald-50 p-4 rounded-3xl">
                                        <span className="text-sm font-bold text-emerald-700">Chemical STP</span>
                                        <span className="text-2xl font-black text-emerald-700">{stats.stp}</span>
                                    </div>
                                    {activeBuilding !== "Menara Samawa" && (
                                        <div className="flex justify-between items-center bg-sky-50 p-4 rounded-3xl">
                                            <span className="text-sm font-bold text-sky-700">Chemical Pool</span>
                                            <span className="text-2xl font-black text-sky-700">{stats.pool}</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
